name: Build raffle-cli (Linux)

on:
  push:
    branches: [main]
    paths:
      - "silverscript/**"
      - "kaspa-raffle-website/covenant/*.sil"
      - ".github/workflows/build-raffle-cli.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Install build deps (rusty-kaspa needs protoc/clang/cmake)
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler clang libclang-dev cmake build-essential pkg-config libssl-dev

      - name: Install Rust (stable; deps require newer than 1.85)
        run: rustup toolchain install stable --profile minimal && rustup default stable && rustc --version

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            silverscript/target
          key: raffle-cli-${{ runner.os }}-${{ hashFiles('silverscript/Cargo.lock') }}

      - name: Build
        working-directory: silverscript
        run: cargo build --release -p raffle-cli

      - name: Smoke test
        run: |
          ./silverscript/target/release/raffle-cli template \
            --dev dddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddd \
            --ops eeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee \
            --close 1751500800000 | head -c 200

      - name: Publish binary to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create bin-latest --title "raffle-cli linux build" \
            --notes "Automated build from ${{ github.sha }}" 2>/dev/null || true
          gh release upload bin-latest silverscript/target/release/raffle-cli --clobber

      # Trigger Render to redeploy ONLY after the new binary is published, so
      # Render never races ahead and ships a stale binary. The hook URL lives in
      # the RENDER_DEPLOY_HOOK repo secret (never in source).
      - name: Trigger Render deploy
        if: success()
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK" && echo " → Render deploy triggered"
          else
            echo "RENDER_DEPLOY_HOOK secret not set; skipping auto-deploy"
          fi
